<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 投資組合管理 v2.0.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
/* ===== 基礎 Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;font-size:14px;color:#e4e6eb;background:#0f1419;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
a{color:#4da3ff;text-decoration:none}

/* ===== Layout ===== */
.app{min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1a2332 0%,#0f1a2e 100%);border-bottom:1px solid #2a3f5f;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-title{font-size:18px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:12px}
.sync-badge{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;background:#2a3f5f;color:#a8b9d0}
.sync-badge.online{background:#1a4a3a;color:#4ade80}
.sync-badge.offline{background:#4a3a1a;color:#fbbf24}
.sync-badge.error{background:#4a1a1a;color:#f87171}

/* ===== Tabs ===== */
.tabs{background:#161b22;border-bottom:1px solid #2a3f5f;display:flex;padding:0 20px;overflow-x:auto;position:sticky;top:53px;z-index:99}
.tab{padding:12px 20px;color:#8b949e;font-size:14px;font-weight:500;background:transparent;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:#e4e6eb;background:rgba(255,255,255,.03)}
.tab.active{color:#4da3ff;border-bottom-color:#4da3ff}

/* ===== Content ===== */
.content{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== Cards ===== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#161b22;border:1px solid #2a3f5f;border-radius:8px;padding:16px;transition:transform .2s,border-color .2s}
.stat-card:hover{transform:translateY(-2px);border-color:#4da3ff}
.stat-label{font-size:12px;color:#8b949e;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:600;color:#e4e6eb}
.stat-sub{font-size:11px;color:#8b949e;margin-top:4px}
.up{color:#4ade80!important}
.down{color:#f87171!important}

/* ===== Action Bar ===== */
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#374151;color:#e4e6eb}
.btn-secondary:hover{background:#4b5563}
.btn-warning{background:#ca8a04;color:#fff}
.btn-warning:hover{background:#a16207}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ===== Table ===== */
.table-wrap{background:#161b22;border:1px solid #2a3f5f;border-radius:8px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a2332;color:#a8b9d0;font-weight:500;text-align:left;padding:10px 12px;border-bottom:1px solid #2a3f5f;white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid #21262d;color:#e4e6eb}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(77,163,255,.05)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.ticker-cell{font-weight:600;color:#fff}
.ticker-name{color:#8b949e;font-size:12px;margin-left:6px}

/* ===== Empty ===== */
.empty{text-align:center;padding:60px 20px;color:#8b949e}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty-text{font-size:14px}
.empty-hint{font-size:12px;margin-top:8px;color:#6e7681}

/* ===== Form ===== */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:#a8b9d0;margin-bottom:6px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #2a3f5f;border-radius:6px;color:#e4e6eb;font-size:13px;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#4da3ff}
.form-textarea{resize:vertical;min-height:60px;font-family:ui-monospace,monospace}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ===== Settings Section ===== */
.section{background:#161b22;border:1px solid #2a3f5f;border-radius:8px;padding:20px;margin-bottom:16px}
.section-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-desc{font-size:12px;color:#8b949e;margin-bottom:14px;line-height:1.6}
.kv-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #21262d;font-size:13px}
.kv-row:last-child{border-bottom:none}
.kv-key{color:#8b949e}
.kv-val{color:#e4e6eb;font-family:ui-monospace,monospace}

/* ===== Modal ===== */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .15s}
.modal{background:#161b22;border:1px solid #2a3f5f;border-radius:10px;width:100%;max-width:480px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{padding:14px 18px;border-bottom:1px solid #2a3f5f;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:600;color:#fff}
.modal-close{background:transparent;color:#8b949e;font-size:20px;width:28px;height:28px;border-radius:4px}
.modal-close:hover{background:#21262d;color:#fff}
.modal-body{padding:18px}
.modal-footer{padding:12px 18px;border-top:1px solid #2a3f5f;display:flex;justify-content:flex-end;gap:8px}

/* ===== Autocomplete ===== */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;margin-top:2px;background:#0d1117;border:1px solid #2a3f5f;border-radius:6px;max-height:200px;overflow-y:auto;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #21262d}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:#1a2332;color:#4da3ff}
.ac-ticker{font-weight:600;margin-right:8px}
.ac-name{color:#8b949e;font-size:12px}

/* ===== Loading ===== */
.loading-screen{position:fixed;inset:0;background:#0f1419;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
.loading-screen.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid #2a3f5f;border-top-color:#4da3ff;border-radius:50%;animation:spin .8s linear infinite}
.loading-text{margin-top:14px;font-size:13px;color:#8b949e}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Toast ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2332;border:1px solid #2a3f5f;color:#e4e6eb;padding:10px 18px;border-radius:6px;font-size:13px;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideUp .25s}
.toast.success{border-color:#16a34a}
.toast.error{border-color:#dc2626}
.toast.warning{border-color:#ca8a04}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

/* ===== Mobile ===== */
@media (max-width:600px){
  .header{padding:10px 14px}
  .header-title{font-size:15px}
  .content{padding:14px}
  .tabs{padding:0 10px}
  .tab{padding:10px 14px;font-size:13px}
  .form-row{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}
.muted{color:#6e7681}
.small{font-size:11px}
</style>
</head>
<body>

<!-- 載入畫面 -->
<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在載入...</div>
</div>

<!-- 主應用 -->
<div class="app" id="app" style="display:none">

  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <span>📊</span>
      <span>投資組合管理</span>
      <span style="font-size:11px;color:#6e7681;font-weight:400">v2.0.0</span>
    </div>
    <div class="header-right">
      <span class="sync-badge" id="syncBadge">💾 本地</span>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab active" data-tab="holdings">📊 持股</button>
    <button class="tab" data-tab="margin">💎 融資券</button>
    <button class="tab" data-tab="futures">📈 期貨</button>
    <button class="tab" data-tab="trades">📋 交易紀錄</button>
    <button class="tab" data-tab="stats">📈 統計</button>
    <button class="tab" data-tab="settings">⚙️ 設定</button>
  </nav>

  <!-- Content -->
  <main class="content">

    <!-- Tab: 持股 -->
    <section class="tab-panel active" id="tab-holdings">
      <div class="stat-grid" id="statGrid"></div>
      <div class="action-bar">
        <button class="btn btn-success" id="btnBuy">🛒 買入</button>
        <button class="btn btn-danger" id="btnSell">💰 賣出</button>
        <button class="btn btn-secondary" id="btnSnapshot">📸 拍快照</button>
        <button class="btn btn-secondary" id="btnUpdatePrice">💲 更新報價</button>
      </div>
      <div id="holdingsList"></div>
    </section>
  
      <!-- Tab: 融資券 -->
    <section class="tab-panel" id="tab-margin">
      <div class="stat-grid" id="marginStatGrid"></div>
      <div class="action-bar">
        <button class="btn btn-success" id="btnMarginBuy">🛒 融資買進 / 融券賣出</button>
        <button class="btn btn-danger" id="btnMarginSell">💰 平倉 / 回補</button>
        <button class="btn btn-secondary" id="btnUpdatePriceMargin">💲 更新報價</button>
      </div>
      <div id="marginList"></div>
    </section>

    <!-- Tab: 期貨 -->
    <section class="tab-panel" id="tab-futures">
      <div class="stat-grid" id="futuresStatGrid"></div>
      <div class="action-bar">
        <button class="btn btn-success" id="btnFuturesOpen">🛒 開倉</button>
        <button class="btn btn-danger" id="btnFuturesClose">💰 平倉</button>
        <button class="btn btn-secondary" id="btnUpdatePriceFutures">💲 更新報價</button>
      </div>
      <div id="futuresList"></div>
    </section>

    <!-- Tab: 交易 -->
    <section class="tab-panel" id="tab-trades">
      <div class="action-bar">
        <button class="btn btn-success btn-sm" id="btnBuy2">🛒 買入</button>
        <button class="btn btn-danger btn-sm" id="btnSell2">💰 賣出</button>
      </div>
      <div id="tradesList"></div>
    </section>

    <!-- Tab: 統計 -->
    <section class="tab-panel" id="tab-stats">
      <div id="statsContent"></div>
    </section>

    <!-- Tab: 設定 -->
    <section class="tab-panel" id="tab-settings">
      <div id="settingsContent"></div>
    </section>

  </main>
</div>

<!-- 模組載入（順序很重要） -->
<!-- ↓↓↓ 在 12-app.js 之前插入 ↓↓↓ -->
<script src="js/01-config.js"></script>
<script src="js/02-utils.js"></script>
<script src="js/03-data-structure.js"></script>
<script src="js/04-storage.js"></script>
<script src="js/05-stats.js"></script>
<script src="js/06-stockdb.js"></script>
<script src="js/07-autocomplete.js"></script>
<script src="js/08-calculator.js"></script>
<script src="js/09-store.js"></script>
<script src="js/10-form-modal.js"></script>
<script src="js/11-trade-list.js"></script>
<script src="js/13-ui.js"></script>
<script src="js/15-price-fetcher.js"></script>   <!-- ⭐ 新增 -->
<script src="js/16-trade-modal.js"></script>   <!-- 🆕 新增 -->
<script src="js/12-app.js"></script>             <!-- 12-app.js 一定要最後 -->


<script>
  // 等所有模組就緒後啟動
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof App !== 'undefined' && typeof App.boot === 'function') {
      App.boot();
    } else {
      document.getElementById('loadingText').textContent = '❌ 模組載入失敗';
      console.error('App 未定義，請檢查 js 檔案');
    }
  });
</script>
</body>
</html>
