<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資組合">
<meta name="theme-color" content="#0a0e27">
<title>投資組合管理</title>

<!-- iOS 加入主畫面圖示（可選） -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0e27'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='%2364ffda'%3E📊%3C/text%3E%3C/svg%3E">

<style>
/* ==========================================================
   🎨 全域變數 - 設計系統
   ========================================================== */
:root {
    /* 主色系 - 深邃科技藍 */
    --bg-primary: #0a0e27;
    --bg-secondary: #131837;
    --bg-tertiary: #1a1f3a;
    --bg-card: rgba(26, 31, 58, 0.6);
    --bg-glass: rgba(255, 255, 255, 0.05);
    
    /* 強調色 */
    --accent-primary: #64ffda;     /* 青綠色 - 主要動作 */
    --accent-secondary: #7c4dff;   /* 紫色 - 次要 */
    --accent-warning: #ffd54f;     /* 黃色 - 警示 */
    
    /* 漲跌色 */
    --color-up: #ff5252;           /* 台股紅漲 */
    --color-down: #00e676;         /* 台股綠跌 */
    --color-flat: #90a4ae;
    
    /* 文字色 */
    --text-primary: #e8eaf6;
    --text-secondary: #9ea2c0;
    --text-tertiary: #6c7293;
    --text-disabled: #4a5072;
    
    /* 邊框與陰影 */
    --border-color: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(100, 255, 218, 0.3);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
    --shadow-glow: 0 0 24px rgba(100, 255, 218, 0.2);
    
    /* 圓角 */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    
    /* 過渡動畫 */
    --transition-fast: 0.15s ease;
    --transition-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ==========================================================
   🔧 重置與基礎
   ========================================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    font-size: 16px;
    scroll-behavior: smooth;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
    
    /* 背景漸層光暈 */
    background-image: 
        radial-gradient(circle at 15% 20%, rgba(124, 77, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(100, 255, 218, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(26, 31, 58, 0.5) 0%, transparent 70%);
    background-attachment: fixed;
}

/* iOS 安全區域 */
@supports (padding: max(0px)) {
    body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }
}

/* ==========================================================
   📱 載入動畫
   ========================================================== */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s, visibility 0.4s;
}

.loading-overlay.hidden {
    opacity: 0;
    visibility: hidden;
}

.loading-spinner {
    width: 60px;
    height: 60px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent-primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ==========================================================
   🎯 設定頁面（首次使用）
   ========================================================== */
.setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
}

.setup-screen.active {
    display: flex;
}

.setup-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-xl);
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: var(--shadow-lg);
}

.setup-card h2 {
    font-size: 1.5rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.setup-card p {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 0.9rem;
}

.setup-card .form-group {
    margin-bottom: 20px;
}

.setup-card label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 8px;
    font-weight: 500;
}

.setup-card input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.95rem;
    transition: var(--transition-base);
    font-family: 'SF Mono', Monaco, monospace;
}

.setup-card input:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
}

.setup-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border: none;
    border-radius: var(--radius-sm);
    color: var(--bg-primary);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition-base);
    margin-top: 8px;
}

.setup-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
}

.setup-btn:active {
    transform: translateY(0);
}

.setup-help {
    margin-top: 20px;
    padding: 16px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    color: var(--text-tertiary);
    line-height: 1.7;
}

/* ==========================================================
   🏗️ 主體佈局
   ========================================================== */
.app-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: none;
}

.app-container.active {
    display: block;
}

/* ==========================================================
   🎩 頂部標題區
   ========================================================== */
.app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding: 20px 24px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
}

.app-title {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 10px;
}

.sync-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    padding: 8px 14px;
    background: var(--bg-tertiary);
    border-radius: 20px;
    border: 1px solid var(--border-color);
}

.sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-flat);
    transition: var(--transition-base);
}

.sync-dot.synced { background: var(--accent-primary); box-shadow: 0 0 8px var(--accent-primary); }
.sync-dot.syncing { background: var(--accent-warning); animation: pulse 1.5s infinite; }
.sync-dot.error { background: var(--color-up); }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* ==========================================================
   📊 總覽卡片
   ========================================================== */
.overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.overview-card {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: var(--transition-base);
    position: relative;
    overflow: hidden;
}

.overview-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    opacity: 0;
    transition: var(--transition-base);
}

.overview-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
}

.overview-card:hover::before {
    opacity: 1;
}

.overview-label {
    font-size: 0.8rem;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.overview-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    font-family: 'SF Mono', Monaco, monospace;
}

.overview-change {
    font-size: 0.85rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
}

.overview-change.up { color: var(--color-up); }
.overview-change.down { color: var(--color-down); }
.overview-change.flat { color: var(--color-flat); }

/* ==========================================================
   🎚️ 分頁標籤
   ========================================================== */
.tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    padding: 6px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    overflow-x: auto;
    scrollbar-width: none;
}

.tab-nav::-webkit-scrollbar { display: none; }

.tab-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 16px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition-base);
    white-space: nowrap;
}

.tab-btn:hover {
    color: var(--text-primary);
    background: var(--bg-glass);
}

.tab-btn.active {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    color: var(--bg-primary);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
}

/* ==========================================================
   📑 分頁內容
   ========================================================== */
.tab-content {
    display: none;
    animation: fadeIn 0.3s ease;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
}

.section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* ==========================================================
   🔘 按鈕
   ========================================================== */
.btn {
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition-base);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    color: var(--bg-primary);
    font-weight: 600;
}

.btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-glow);
}

.btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}

.btn-secondary:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
}

.btn-danger {
    background: rgba(255, 82, 82, 0.1);
    color: var(--color-up);
    border: 1px solid rgba(255, 82, 82, 0.3);
}

.btn-danger:hover {
    background: rgba(255, 82, 82, 0.2);
}

.btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    justify-content: center;
}

/* ==========================================================
   📋 表格
   ========================================================== */
.table-container {
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow: hidden;
    overflow-x: auto;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
    min-width: 700px;
}

.data-table thead {
    background: var(--bg-tertiary);
}

.data-table th {
    padding: 14px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
}

.data-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
    font-family: 'SF Mono', Monaco, monospace;
    white-space: nowrap;
}

.data-table tbody tr {
    transition: var(--transition-fast);
}

.data-table tbody tr:hover {
    background: var(--bg-glass);
}

.data-table tbody tr:last-child td {
    border-bottom: none;
}

.text-up { color: var(--color-up); }
.text-down { color: var(--color-down); }
.text-flat { color: var(--color-flat); }

/* ==========================================================
   📭 空狀態
   ========================================================== */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
}

.empty-state-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.5;
}

.empty-state-text {
    font-size: 0.95rem;
    margin-bottom: 20px;
}

/* ==========================================================
   🎭 Modal 彈窗
   ========================================================== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    animation: fadeIn 0.2s ease;
}

.modal-overlay.active {
    display: flex;
}

.modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-xl);
    padding: 28px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.modal-title {
    font-size: 1.2rem;
    font-weight: 600;
}

.modal-close {
    background: var(--bg-tertiary);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1.2rem;
    transition: var(--transition-base);
}

.modal-close:hover {
    background: var(--color-up);
    color: white;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.95rem;
    transition: var(--transition-base);
    font-family: inherit;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
}

.modal-actions .btn {
    flex: 1;
    justify-content: center;
}

/* ==========================================================
   🍞 Toast 通知
   ========================================================== */
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.toast {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 14px 20px;
    box-shadow: var(--shadow-md);
    min-width: 240px;
    max-width: 360px;
    animation: slideInRight 0.3s ease;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
}

@keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-left: 3px solid var(--accent-primary); }
.toast.error { border-left: 3px solid var(--color-up); }
.toast.info { border-left: 3px solid var(--accent-secondary); }

.toast-icon {
    font-size: 1.2rem;
}

.toast-message {
    flex: 1;
    font-size: 0.9rem;
}

/* ==========================================================
   📱 響應式（手機）
   ========================================================== */
@media (max-width: 768px) {
    .app-container { padding: 12px; }
    
    .app-header {
        padding: 14px 16px;
        margin-bottom: 16px;
    }
    
    .app-title { font-size: 1.2rem; }
    .sync-status { font-size: 0.7rem; padding: 6px 10px; }
    
    .overview-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    
    .overview-card { padding: 14px; }
    .overview-value { font-size: 1.3rem; }
    .overview-label { font-size: 0.7rem; }
    
    .tab-btn {
        min-width: 80px;
        padding: 8px 12px;
        font-size: 0.85rem;
    }
    
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .modal {
        padding: 20px;
        border-radius: var(--radius-lg);
    }
    
    .toast-container {
        top: 10px;
        right: 10px;
        left: 10px;
    }
    
    .toast { min-width: auto; }
}

/* ==========================================================
   ✨ 額外動畫
   ========================================================== */
.fade-in {
    animation: fadeIn 0.4s ease;
}

.scrollbar-hide::-webkit-scrollbar { display: none; }

/* 自訂滾動條 */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-secondary);
}

::-webkit-scrollbar-thumb {
    background: var(--bg-tertiary);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-primary);
}
</style>
</head>
<body>

<!-- ============================================================
     🔄 載入動畫
     ============================================================ -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- ============================================================
     🎯 設定頁面（首次使用）
     ============================================================ -->
<div class="setup-screen" id="setupScreen">
    <div class="setup-card">
        <h2>🚀 歡迎使用投資組合管理</h2>
        <p>首次使用需要設定 GitHub Token 和 Gist ID，讓你的資料能在電腦和手機間同步。</p>
        
        <div class="form-group">
            <label for="setupToken">GitHub Token</label>
            <input type="password" id="setupToken" placeholder="github_pat_xxxxxxxxxxxx">
        </div>
        
        <div class="form-group">
            <label for="setupGistId">Gist ID</label>
            <input type="text" id="setupGistId" placeholder="例如：3f8a2b1c9d4e5f6a7b8c9d0e">
        </div>
        
        <button class="setup-btn" id="setupSaveBtn">儲存並開始使用</button>
        
        <div class="setup-help">
            💡 這兩個資訊只會儲存在你自己的瀏覽器，不會傳送到任何第三方伺服器。<br>
            🔐 Token 已加密儲存於 localStorage。
        </div>
    </div>
</div>

<!-- ============================================================
     🏠 主應用程式
     ============================================================ -->
<div class="app-container" id="appContainer">
    
    <!-- 標題列 -->
    <header class="app-header">
        <div class="app-title">

<script>
/* ============================================================
   📦 投資組合管理系統 - JavaScript Part 1
   模組：CONFIG / Utils / Storage / GistAPI / DataModel / State
   ============================================================ */
'use strict';

/* ============================================================
   📦 Portfolio Manager v2.0.0 - Part 1
   ============================================================
   - 配置 / 工具 / 儲存
   - 雙 Gist 檔案管理
   - v1→v2 遷移
   - 每日快照系統
   ============================================================ */

// ============================================================
// 🔧 全域配置
// ============================================================
const CONFIG = {
  VERSION: '2.0.0',
  STORAGE_KEYS: {
    TOKEN: 'portfolio_token',
    GIST_ID: 'portfolio_gist_id',
    LOCAL_DATA: 'portfolio_local_data',
    LOCAL_HISTORY: 'portfolio_local_history',
    LAST_SYNC: 'portfolio_last_sync'
  },
  GIST_FILES: {
    MAIN: 'portfolio.json',
    HISTORY: 'history.json'
  },
  HISTORY: {
    DAILY_KEEP_DAYS: 90,      // 90 天內每日記錄
    WEEKLY_KEEP_DAYS: 365,    // 90~365 天每週記錄
    // 365 天以上每月記錄
  },
  PRICE_FETCH: {
    INTERVAL: 60000,          // 1 分鐘
    RETRY_DELAY: 5000,
    MAX_RETRY: 3
  },
  MARKET_HOURS: {
    TW_OPEN: { hour: 9, minute: 0 },
    TW_CLOSE: { hour: 13, minute: 30 },
    TW_FUTURES_OPEN: { hour: 8, minute: 45 },
    TW_FUTURES_CLOSE: { hour: 13, minute: 45 }
  }
};

// ============================================================
// 🛠️ 工具函式
// ============================================================
const Utils = {
  // 產生唯一 ID
  uid(prefix = 'id') {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  },

  // 今日日期 YYYY-MM-DD
  today() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  },

  // 數字格式化
  fmtNum(n, digits = 0) {
    if (n === null || n === undefined || isNaN(n)) return '-';
    return Number(n).toLocaleString('zh-TW', {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    });
  },

  // 金額格式化
  fmtMoney(n, currency = 'TWD') {
    if (n === null || n === undefined || isNaN(n)) return '-';
    const symbol = currency === 'TWD' ? 'NT$' : '$';
    return `${symbol}${this.fmtNum(n, 0)}`;
  },

  // 百分比
  fmtPct(n, digits = 2) {
    if (n === null || n === undefined || isNaN(n)) return '-';
    return `${Number(n).toFixed(digits)}%`;
  },

  // 日期時間
  fmtDateTime(iso) {
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      return d.toLocaleString('zh-TW', { hour12: false });
    } catch (e) {
      return '-';
    }
  },

  // 兩日期相差天數
  daysBetween(date1, date2) {
    const d1 = new Date(date1);
    const d2 = new Date(date2);
    return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
  },

  // 深拷貝
  deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
  },

  // 是否在台股盤中
  isTwMarketOpen() {
    const now = new Date();
    const day = now.getDay();
    if (day === 0 || day === 6) return false;
    const h = now.getHours();
    const m = now.getMinutes();
    const mins = h * 60 + m;
    return mins >= (9 * 60) && mins <= (13 * 60 + 30);
  },

  // 是否在台期盤中
  isTwFuturesOpen() {
    const now = new Date();
    const day = now.getDay();
    if (day === 0 || day === 6) return false;
    const h = now.getHours();
    const m = now.getMinutes();
    const mins = h * 60 + m;
    return mins >= (8 * 60 + 45) && mins <= (13 * 60 + 45);
  },

  // 防抖
  debounce(fn, wait = 300) {
    let timer;
    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), wait);
    };
  },

  // HTML escape
  escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
};

// ============================================================
// 📦 資料結構工具 - 預設資料
// ============================================================
const DataStructure = {
  // 預設主資料
  getDefaultPortfolio() {
    return {
      version: CONFIG.VERSION,
      lastUpdate: new Date().toISOString(),
      stocks: [],
      margin: [],
      futures: [],
      watchlist: [],
      settings: {
        autoFetchPrice: true,
        fetchInterval: 60000,
        onlyMarketHours: true,
        defaultMarginRate: 0.6,
        defaultInterestRate: 0.06,
        theme: 'dark',
        currency: 'TWD',
        language: 'zh-TW'
      }
    };
  },

  // 預設歷史資料
  getDefaultHistory() {
    return {
      version: CONFIG.VERSION,
      snapshots: [],
      transactions: []
    };
  },

  // 建立空 stock 物件
  createStock(symbol, name, market = 'TW') {
    return {
      id: Utils.uid('stk'),
      symbol: symbol,
      name: name,
      market: market,
      industry: '',
      lots: [],
      currentPrice: 0,
      lastPriceUpdate: null,
      realizedPnl: 0,
      tRollingProfit: 0
    };
  },

  // 建立 lot
  createStockLot(shares, cost, date = null, fee = 0, note = '') {
    return {
      id: Utils.uid('lot'),
      shares: Number(shares) || 0,
      cost: Number(cost) || 0,
      date: date || Utils.today(),
      fee: Number(fee) || 0,
      note: note || ''
    };
  },

  // 建立融資 lot
  createMarginLot(shares, cost, marginRate, interestRate, date, fee, note) {
    const total = shares * cost;
    const ownFund = total * (1 - marginRate);
    const marginLoan = total * marginRate;
    return {
      id: Utils.uid('lot'),
      shares: Number(shares) || 0,
      cost: Number(cost) || 0,
      date: date || Utils.today(),
      marginRate: Number(marginRate) || 0.6,
      ownFund: ownFund,
      marginLoan: marginLoan,
      interestRate: Number(interestRate) || 0.06,
      fee: Number(fee) || 0,
      note: note || ''
    };
  },

  // 建立期貨 lot
  createFuturesLot(direction, contracts, entryPrice, margin, contractSize, date, fee, note) {
    return {
      id: Utils.uid('lot'),
      direction: direction || 'long',
      contracts: Number(contracts) || 0,
      entryPrice: Number(entryPrice) || 0,
      margin: Number(margin) || 0,
      contractSize: Number(contractSize) || 200,
      date: date || Utils.today(),
      fee: Number(fee) || 0,
      note: note || ''
    };
  },

  // 建立交易紀錄
  createTransaction(type, category, symbol, name, shares, price, options = {}) {
    return {
      id: Utils.uid('tx'),
      timestamp: new Date().toISOString(),
      type: type,
      category: category,
      symbol: symbol,
      name: name || '',
      shares: Number(shares) || 0,
      price: Number(price) || 0,
      amount: (Number(shares) || 0) * (Number(price) || 0),
      fee: Number(options.fee) || 0,
      tax: Number(options.tax) || 0,
      realizedPnl: Number(options.realizedPnl) || 0,
      relatedLotIds: options.relatedLotIds || [],
      note: options.note || ''
    };
  },

  // 建立每日快照
  createSnapshot(stats) {
    return {
      date: Utils.today(),
      timestamp: new Date().toISOString(),
      totalAssets: stats.totalAssets || 0,
      totalCost: stats.totalCost || 0,
      totalPnl: stats.totalPnl || 0,
      pnlPct: stats.pnlPct || 0,
      breakdown: {
        stocks: stats.breakdown?.stocks || 0,
        margin: stats.breakdown?.margin || 0,
        futures: stats.breakdown?.futures || 0,
        cash: stats.breakdown?.cash || 0
      },
      positionsCount: stats.positionsCount || 0,
      realizedPnlAccum: stats.realizedPnlAccum || 0
    };
  }
};

// ============================================================
// 🔄 v1 → v2 遷移工具
// ============================================================
const Migration = {
  // 檢查是否為 v1 格式
  isV1(data) {
    if (!data) return false;
    if (data.version === '2.0.0') return false;
    // v1 通常沒有 version 或為 1.x
    if (!data.version || data.version.startsWith('1.')) return true;
    // 或者 stocks 結構是舊的（沒有 lots）
    if (Array.isArray(data.stocks) && data.stocks.length > 0) {
      const first = data.stocks[0];
      if (first && !Array.isArray(first.lots)) return true;
    }
    return false;
  },

  // 執行遷移
  migrate(oldData) {
    console.log('[Migration] 開始 v1 → v2 遷移...');
    const newData = DataStructure.getDefaultPortfolio();
    
    try {
      // 遷移現股
      if (Array.isArray(oldData.stocks)) {
        newData.stocks = oldData.stocks.map(s => this.migrateStock(s));
      }
      
      // 遷移期貨
      if (Array.isArray(oldData.futures)) {
        newData.futures = oldData.futures.map(f => this.migrateFutures(f));
      }
      
      // 遷移觀察清單
      if (Array.isArray(oldData.watchlist)) {
        newData.watchlist = oldData.watchlist.map(w => ({
          id: w.id || Utils.uid('wl'),
          symbol: w.symbol || '',
          name: w.name || '',
          market: w.market || 'TW',
          currentPrice: Number(w.currentPrice) || 0,
          addedDate: w.addedDate || new Date().toISOString(),
          note: w.note || ''
        }));
      }
      
      // 遷移設定
      if (oldData.settings) {
        Object.assign(newData.settings, oldData.settings);
      }
      
      console.log('[Migration] ✅ 遷移完成');
      return newData;
    } catch (err) {
      console.error('[Migration] ❌ 遷移失敗:', err);
      throw new Error(`資料遷移失敗：${err.message}`);
    }
  },

  // 遷移單一現股
  migrateStock(old) {
    const stock = DataStructure.createStock(
      old.symbol || '',
      old.name || '',
      old.market || 'TW'
    );
    stock.industry = old.industry || '';
    stock.currentPrice = Number(old.currentPrice) || 0;
    stock.lastPriceUpdate = old.lastPriceUpdate || null;
    stock.realizedPnl = Number(old.realizedPnl) || 0;
    
    // 把舊的 shares + avgCost 轉成單一 lot
    if (old.shares && old.avgCost) {
      stock.lots.push(DataStructure.createStockLot(
        old.shares,
        old.avgCost,
        old.buyDate || old.date || Utils.today(),
        old.fee || 0,
        old.note || ''
      ));
    } else if (Array.isArray(old.lots)) {
      // 已經是新格式（部分升級）
      stock.lots = old.lots.map(l => ({
        id: l.id || Utils.uid('lot'),
        shares: Number(l.shares) || 0,
        cost: Number(l.cost) || 0,
        date: l.date || Utils.today(),
        fee: Number(l.fee) || 0,
        note: l.note || ''
      }));
    }
    
    return stock;
  },

  // 遷移單一期貨
  migrateFutures(old) {
    const fut = {
      id: old.id || Utils.uid('fut'),
      symbol: old.symbol || '',
      name: old.name || '',
      productType: old.productType || 'TXF',
      lots: [],
      currentPrice: Number(old.currentPrice) || 0,
      lastPriceUpdate: old.lastPriceUpdate || null,
      realizedPnl: Number(old.realizedPnl) || 0
    };
    
    // 舊格式單筆 → 一個 lot
    if (old.contracts !== undefined && old.entryPrice !== undefined) {
      fut.lots.push(DataStructure.createFuturesLot(
        old.direction || 'long',
        old.contracts,
        old.entryPrice,
        old.margin || 0,
        old.contractSize || 200,
        old.date || Utils.today(),
        old.fee || 0,
        old.note || ''
      ));
    } else if (Array.isArray(old.lots)) {
      fut.lots = old.lots;
    }
    
    return fut;
  }
};

// ============================================================
// 💾 儲存層 - LocalStorage + Gist
// ============================================================
const Storage = {
  // ---------- LocalStorage ----------
  saveLocal(data) {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEYS.LOCAL_DATA, JSON.stringify(data));
      return true;
    } catch (e) {
      console.error('[Storage] saveLocal 失敗:', e);
      return false;
    }
  },

  loadLocal() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.LOCAL_DATA);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      console.error('[Storage] loadLocal 失敗:', e);
      return null;
    }
  },

  saveLocalHistory(history) {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEYS.LOCAL_HISTORY, JSON.stringify(history));
      return true;
    } catch (e) {
      console.error('[Storage] saveLocalHistory 失敗:', e);
      return false;
    }
  },

  loadLocalHistory() {
    try {
      const raw = localStorage.getItem(CONFIG.STORAGE_KEYS.LOCAL_HISTORY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      console.error('[Storage] loadLocalHistory 失敗:', e);
      return null;
    }
  },

  getToken() {
    return localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
  },

  getGistId() {
    return localStorage.getItem(CONFIG.STORAGE_KEYS.GIST_ID);
  },

  setToken(token) {
    localStorage.setItem(CONFIG.STORAGE_KEYS.TOKEN, token);
  },

  setGistId(id) {
    localStorage.setItem(CONFIG.STORAGE_KEYS.GIST_ID, id);
  },

  setLastSync(iso) {
    localStorage.setItem(CONFIG.STORAGE_KEYS.LAST_SYNC, iso);
  },

  getLastSync() {
    return localStorage.getItem(CONFIG.STORAGE_KEYS.LAST_SYNC);
  },

  clearAll() {
    Object.values(CONFIG.STORAGE_KEYS).forEach(k => localStorage.removeItem(k));
  },

  // ---------- Gist API ----------
  async gistRequest(method, path = '', body = null) {
    const token = this.getToken();
    if (!token) throw new Error('尚未設定 Token');
    
    const url = `https://api.github.com${path}`;
    const opts = {
      method: method,
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    
    const res = await fetch(url, opts);
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Gist API ${res.status}: ${txt}`);
    }
    return res.json();
  },

  // 載入 Gist（同時取得主資料 + 歷史）
  async loadFromGist() {
    const gistId = this.getGistId();
    if (!gistId) throw new Error('尚未設定 Gist ID');
    
    const gist = await this.gistRequest('GET', `/gists/${gistId}`);
    const files = gist.files || {};
    
    // 主資料
    let portfolio = null;
    const mainFile = files[CONFIG.GIST_FILES.MAIN];
    if (mainFile && mainFile.content) {
      try {
        portfolio = JSON.parse(mainFile.content);
      } catch (e) {
        console.error('[Storage] 解析 portfolio.json 失敗:', e);
      }
    }
    
    // 歷史資料
    let history = null;
    const histFile = files[CONFIG.GIST_FILES.HISTORY];
    if (histFile && histFile.content) {
      try {
        history = JSON.parse(histFile.content);
      } catch (e) {
        console.error('[Storage] 解析 history.json 失敗:', e);
      }
    }
    
    // 自動遷移
    if (portfolio && Migration.isV1(portfolio)) {
      console.log('[Storage] 偵測到 v1 資料，自動升級...');
      portfolio = Migration.migrate(portfolio);
      // 升級後立即推回 Gist
      await this.saveToGist(portfolio, history || DataStructure.getDefaultHistory());
    }
    
    return {
      portfolio: portfolio || DataStructure.getDefaultPortfolio(),
      history: history || DataStructure.getDefaultHistory()
    };
  },

  // 儲存到 Gist（主資料 + 歷史）
  async saveToGist(portfolio, history) {
    const gistId = this.getGistId();
    if (!gistId) throw new Error('尚未設定 Gist ID');
    
    portfolio.lastUpdate = new Date().toISOString();
    portfolio.version = CONFIG.VERSION;
    if (history) history.version = CONFIG.VERSION;
    
    const files = {};
    files[CONFIG.GIST_FILES.MAIN] = {
      content: JSON.stringify(portfolio, null, 2)
    };
    if (history) {
      files[CONFIG.GIST_FILES.HISTORY] = {
        content: JSON.stringify(history, null, 2)
      };
    }
    
    await this.gistRequest('PATCH', `/gists/${gistId}`, { files });
    this.setLastSync(new Date().toISOString());
    return true;
  }
};

// ============================================================
// 📊 統計計算引擎
// ============================================================
const Stats = {
  // 計算單一 stock 的統計
  calcStock(stock) {
    let totalShares = 0;
    let totalCost = 0;
    
    (stock.lots || []).forEach(lot => {
      totalShares += lot.shares;
      totalCost += lot.shares * lot.cost + (lot.fee || 0);
    });
    
    const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
    const marketValue = totalShares * (stock.currentPrice || 0);
    const unrealizedPnl = marketValue - totalCost;
    const pnlPct = totalCost > 0 ? (unrealizedPnl / totalCost) * 100 : 0;
    
    // 等效成本（扣除滾動 T 獲利）
    const effectiveCost = totalShares > 0 
      ? avgCost - ((stock.tRollingProfit || 0) / totalShares)
      : 0;
    
    return {
      totalShares,
      totalCost,
      avgCost,
      effectiveCost,
      marketValue,
      unrealizedPnl,
      pnlPct,
      realizedPnl: stock.realizedPnl || 0,
      tRollingProfit: stock.tRollingProfit || 0
    };
  },

  // 計算融資個股
  calcMargin(margin) {
    let totalShares = 0;
    let totalCost = 0;
    let totalOwnFund = 0;
    let totalMarginLoan = 0;
    let totalInterest = 0;
    const today = new Date();
    
    (margin.lots || []).forEach(lot => {
      totalShares += lot.shares;
      totalCost += lot.shares * lot.cost + (lot.fee || 0);
      totalOwnFund += lot.ownFund || 0;
      totalMarginLoan += lot.marginLoan || 0;
      
      // 利息累計
      const days = Utils.daysBetween(lot.date, today);
      const interest = (lot.marginLoan || 0) * (lot.interestRate || 0) * days / 365;
      totalInterest += interest;
    });
    
    const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
    const marketValue = totalShares * (margin.currentPrice || 0);
    const unrealizedPnl = marketValue - totalCost - totalInterest;
    const pnlPct = totalOwnFund > 0 ? (unrealizedPnl / totalOwnFund) * 100 : 0;
    
    // 維持率
    const maintainRatio = totalMarginLoan > 0 ? (marketValue / totalMarginLoan) * 100 : 0;
    
    // 風險等級
    let riskLevel = 'safe';
    if (maintainRatio < 130) riskLevel = 'danger';
    else if (maintainRatio < 166) riskLevel = 'warning';
    
    return {
      totalShares,
      totalCost,
      avgCost,
      totalOwnFund,
      totalMarginLoan,
      totalInterest,
      marketValue,
      unrealizedPnl,
      pnlPct,
      maintainRatio,
      riskLevel,
      realizedPnl: margin.realizedPnl || 0,
      tRollingProfit: margin.tRollingProfit || 0
    };
  },

  // 計算期貨
  calcFutures(fut) {
    let totalContracts = 0;
    let totalMargin = 0;
    let weightedEntry = 0;
    let unrealizedPnl = 0;
    let direction = null;
    
    (fut.lots || []).forEach(lot => {
      totalContracts += lot.contracts;
      totalMargin += lot.margin || 0;
      weightedEntry += lot.entryPrice * lot.contracts;
      direction = lot.direction;
      
      const dir = lot.direction === 'long' ? 1 : -1;
      const points = (fut.currentPrice - lot.entryPrice) * dir;
      unrealizedPnl += points * lot.contracts * (lot.contractSize || 200);
    });
    
    const avgEntry = totalContracts > 0 ? weightedEntry / totalContracts : 0;
    const pnlPct = totalMargin > 0 ? (unrealizedPnl / totalMargin) * 100 : 0;
    
    return {
      totalContracts,
      totalMargin,
      avgEntry,
      direction,
      unrealizedPnl,
      pnlPct,
      realizedPnl: fut.realizedPnl || 0
    };
  },

  // 計算總資產
  calcTotal(portfolio) {
    let stocksValue = 0, stocksCost = 0, stocksPnl = 0;
    let marginValue = 0, marginOwnFund = 0, marginPnl = 0, marginLoan = 0;
    let futuresPnl = 0, futuresMargin = 0;
    let positions = 0;
    
    (portfolio.stocks || []).forEach(s => {
      const c = this.calcStock(s);
      if (c.totalShares > 0) {
        stocksValue += c.marketValue;
        stocksCost += c.totalCost;
        stocksPnl += c.unrealizedPnl;
        positions++;
      }
    });
    
    (portfolio.margin || []).forEach(m => {
      const c = this.calcMargin(m);
      if (c.totalShares > 0) {
        marginValue += c.marketValue;
        marginOwnFund += c.totalOwnFund;
        marginLoan += c.totalMarginLoan;
        marginPnl += c.unrealizedPnl;
        positions++;
      }
    });
    
    (portfolio.futures || []).forEach(f => {
      const c = this.calcFutures(f);
      if (c.totalContracts > 0) {
        futuresMargin += c.totalMargin;
        futuresPnl += c.unrealizedPnl;
        positions++;
      }
    });
    
    // 自有資金總計（現股全部 + 融資自備款 + 期貨保證金）
    const totalOwnFund = stocksCost + marginOwnFund + futuresMargin;
    // 總資產（市值角度）
    const totalAssets = stocksValue + (marginValue - marginLoan) + futuresMargin + futuresPnl;
    const totalPnl = stocksPnl + marginPnl + futuresPnl;
    const totalCost = stocksCost + marginOwnFund + futuresMargin;
    const pnlPct = totalCost > 0 ? (totalPnl / totalCost) * 100 : 0;
    
    return {
      totalAssets,
      totalCost,
      totalPnl,
      pnlPct,
      positions,
      breakdown: {
        stocks: stocksValue,
        margin: marginValue - marginLoan,
        futures: futuresMargin + futuresPnl,
        cash: 0
      },
      detail: {
        stocksValue, stocksCost, stocksPnl,
        marginValue, marginOwnFund, marginLoan, marginPnl,
        futuresMargin, futuresPnl
      }
    };
  }
};

// 📅 每日快照系統
// ============================================================
const SnapshotManager = {
  // 取得今日快照（若存在）
  getTodaySnapshot(history) {
    if (!history || !Array.isArray(history.snapshots)) return null;
    const today = Utils.today();
    return history.snapshots.find(s => s.date === today) || null;
  },

  // 建立或更新今日快照
  recordToday(portfolio, history) {
    if (!history) history = DataStructure.getDefaultHistory();
    if (!Array.isArray(history.snapshots)) history.snapshots = [];
    
    const stats = Stats.calcTotal(portfolio);
    const realizedAccum = (history.transactions || [])
      .reduce((sum, tx) => sum + (tx.realizedPnl || 0), 0);
    
    const snapshot = DataStructure.createSnapshot({
      ...stats,
      realizedPnlAccum: realizedAccum
    });
    
    // 移除今日舊快照（同日只保留最新）
    history.snapshots = history.snapshots.filter(s => s.date !== snapshot.date);
    history.snapshots.push(snapshot);
    history.snapshots.sort((a, b) => a.date.localeCompare(b.date));
    
    // 智慧清理（90 天日記、365 天週記、永久月記）
    this.compactSnapshots(history);
    
    return snapshot;
  },

  // 智慧壓縮歷史
  compactSnapshots(history) {
    if (!history.snapshots || history.snapshots.length === 0) return;
    
    const today = new Date();
    const keep = [];
    const seenWeeks = new Set();
    const seenMonths = new Set();
    
    // 反向（從新到舊）處理
    const sorted = [...history.snapshots].sort((a, b) => b.date.localeCompare(a.date));
    
    sorted.forEach(snap => {
      const days = Utils.daysBetween(snap.date, today);
      
      if (days <= CONFIG.HISTORY.DAILY_KEEP_DAYS) {
        keep.push(snap);
      } else if (days <= CONFIG.HISTORY.WEEKLY_KEEP_DAYS) {
        const d = new Date(snap.date);
        const wk = `${d.getFullYear()}-W${Math.floor((d.getDate() - 1) / 7)}`;
        if (!seenWeeks.has(wk)) {
          seenWeeks.add(wk);
          keep.push(snap);
        }
      } else {
        const ym = snap.date.substring(0, 7);
        if (!seenMonths.has(ym)) {
          seenMonths.add(ym);
          keep.push(snap);
        }
      }
    });
    
    history.snapshots = keep.sort((a, b) => a.date.localeCompare(b.date));
  },

  // 取得區間快照
  getRange(history, days) {
    if (!history || !Array.isArray(history.snapshots)) return [];
    if (days === 'all') return [...history.snapshots];
    
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    const cutoffStr = `${cutoff.getFullYear()}-${String(cutoff.getMonth() + 1).padStart(2, '0')}-${String(cutoff.getDate()).padStart(2, '0')}`;
    
    return history.snapshots.filter(s => s.date >= cutoffStr);
  }
};

/* ============================================================

   ============================================================ */
const Toast = {
    container: null,
    
    init() {
        this.container = document.getElementById('toastContainer');
    },
    
    show(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
        if (!this.container) this.init();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icons = {
            success: '✅',
            error: '❌',
            info: 'ℹ️',
            warning: '⚠️'
        };
        
        toast.innerHTML = `
            <span class="toast-icon">${icons[type] || icons.info}</span>
            <span class="toast-message">${this.escapeHtml(message)}</span>
        `;
        
        this.container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideInRight 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    },
    
    success(msg) { this.show(msg, 'success'); },
    error(msg) { this.show(msg, 'error', 4000); },
    info(msg) { this.show(msg, 'info'); },
    warning(msg) { this.show(msg, 'warning'); },
    
    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
};

                    <td>${Utils.formatNumber(s.avgCost)}</td>
                    <td>${Utils.formatNumber(s.currentPrice)}</td>
                    <td>${Utils.formatMoney(r.value)}</td>

                        <button class="btn btn-danger btn-icon" onclick="UI.deleteStock('${s.id}')" title="刪除">🗑️</button>
                    </td>

            `;
        }).join('');
        
        container.innerHTML = `
            <div class="table-container">

                    <thead>
                        <tr>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>股數</th>
                            <th>均價</th>
                            <th>現價</th>
                            <th>市值</th>
                            <th>損益</th>
                            <th>損益率</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    },
    
    /**
     * 渲染期貨列表
     */
    renderFutures() {
        const container = document.getElementById('futuresContainer');
        const futures = State.data.futures;
        
        if (futures.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div class="empty-state-text">尚未新增任何期貨部位</div>
                    <button class="btn btn-primary" onclick="Modal.openFuturesForm()">＋ 立即新增</button>
                </div>
            `;
            return;
        }
        
        const rows = futures.map(f => {
            const r = DataModel.calcFuturesPnl(f);
            const cls = r.pnl > 0 ? 'text-up' : (r.pnl < 0 ? 'text-down' : 'text-flat');
            const dirIcon = f.direction === 'long' ? '📈 多' : '📉 空';
            const dirCls = f.direction === 'long' ? 'text-up' : 'text-down';
            return `
                <tr>
                    <td><strong>${f.symbol}</strong></td>
                    <td>${f.name || '—'}</td>
                    <td class="${dirCls}">${dirIcon}</td>
                    <td>${f.contracts} 口</td>
                    <td>${Utils.formatNumber(f.entryPrice)}</td>
                    <td>${Utils.formatNumber(f.currentPrice)}</td>
                    <td class="${cls}">${Utils.formatNumber(r.points)}</td>
                    <td class="${cls}">${Utils.formatMoney(r.pnl)}</td>
                    <td>
                        <button class="btn btn-secondary btn-icon" onclick="UI.editFutures('${f.id}')" title="編輯">✏️</button>
                        <button class="btn btn-danger btn-icon" onclick="UI.deleteFutures('${f.id}')" title="刪除">🗑️</button>
                    </td>

            `;
        }).join('');
        
        container.innerHTML = `
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>方向</th>
                            <th>口數</th>
                            <th>進場價</th>
                            <th>現價</th>
                            <th>點數</th>
                            <th>損益</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    },
    
    /**
     * 渲染觀察清單
     */
    renderWatchlist() {
        const container = document.getElementById('watchlistContainer');
        const items = State.data.watchlist;
        
        if (items.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div class="empty-state-text">尚未新增任何觀察項目</div>
                    <button class="btn btn-primary" onclick="Modal.openWatchlistForm()">＋ 立即新增</button>
                </div>
            `;
            return;
        }
        
        const rows = items.map(w => {
            const r = DataModel.calcWatchDiff(w);
            const cls = r.diff > 0 ? 'text-up' : (r.diff < 0 ? 'text-down' : 'text-flat');
            return `
                <tr>
                    <td><strong>${w.symbol}</strong></td>
                    <td>${w.name || '—'}</td>
                    <td>${Utils.formatNumber(w.targetPrice)}</td>
                    <td>${Utils.formatNumber(w.currentPrice)}</td>
                    <td class="${cls}">${Utils.formatNumber(r.diff)}</td>
                    <td class="${cls}">${Utils.formatPercent(r.diffPct)}</td>
                    <td>${w.note || '—'}</td>
                    <td>
                        <button class="btn btn-secondary btn-icon" onclick="UI.editWatch('${w.id}')" title="編輯">✏️</button>
                        <button class="btn btn-danger btn-icon" onclick="UI.deleteWatch('${w.id}')" title="刪除">🗑️</button>
                    </td>
                </tr>
            `;
        }).join('');
        
        container.innerHTML = `
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>目標價</th>
                            <th>目前價</th>
                            <th>差距</th>
                            <th>差距%</th>
                            <th>備註</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    },
    
    /**
     * 渲染設定頁
     */
    renderSettings() {
        const token = Storage.getToken();
        const gistId = Storage.getGistId();
        const lastSync = Storage.getLastSync();
        
        if (token) {
            // 顯示遮罩後的 Token
            const masked = token.substring(0, 8) + '••••••••' + token.substring(token.length - 4);
            document.getElementById('settingsToken').value = masked;
        }
        document.getElementById('settingsGistId').value = gistId || '';
        document.getElementById('lastSyncTime').textContent = Utils.formatRelativeTime(lastSync);
        
        const total = State.data.stocks.length + State.data.futures.length + State.data.watchlist.length;
        document.getElementById('dataCount').textContent = total + ' 筆';
    },
    
    /**
     * 更新同步狀態指示器
     */
    updateSyncStatus(status) {
        const dot = document.getElementById('syncDot');
        const text = document.getElementById('syncText');
        
        dot.className = 'sync-dot';
        
        switch (status) {
            case 'syncing':
                dot.classList.add('syncing');
                text.textContent = '同步中...';
                break;
            case 'synced':
                dot.classList.add('synced');
                text.textContent = '已同步 ' + Utils.formatRelativeTime(Storage.getLastSync());
                break;
            case 'error':
                dot.classList.add('error');
                text.textContent = '同步失敗';
                break;
            default:
                text.textContent = '待機中';
        }
    },
    
    /**
     * 切換分頁
     */
    switchTab(tabName) {
        State.activeTab = tabName;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tabName);
        });
        
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.toggle('active', content.id === `tab-${tabName}`);
        });
    },
    
    // ============ 操作快捷方法 ============
    editStock(id) {
        const stock = State.data.stocks.find(s => s.id === id);
        if (stock) Modal.openStockForm(stock);
    },
    
    deleteStock(id) {
        const stock = State.data.stocks.find(s => s.id === id);
        if (!stock) return;
        Modal.confirm(
            '⚠️ 確認刪除',
            `確定要刪除「${stock.symbol} ${stock.name || ''}」嗎？此操作無法復原。`,
            () => {
                State.deleteStock(id);
                Toast.success('已刪除');
                Sync.scheduleSync();
            }
        );
    },
    
    editFutures(id) {
        const f = State.data.futures.find(x => x.id === id);
        if (f) Modal.openFuturesForm(f);
    },
    
    deleteFutures(id) {
        const f = State.data.futures.find(x => x.id === id);
        if (!f) return;
        Modal.confirm(
            '⚠️ 確認刪除',
            `確定要刪除期貨部位「${f.symbol}」嗎？`,
            () => {
                State.deleteFutures(id);
                Toast.success('已刪除');
                Sync.scheduleSync();
            }
        );
    },
    
    editWatch(id) {
        const w = State.data.watchlist.find(x => x.id === id);
        if (w) Modal.openWatchlistForm(w);
    },
    
    deleteWatch(id) {
        const w = State.data.watchlist.find(x => x.id === id);
        if (!w) return;
        Modal.confirm(
            '⚠️ 確認刪除',
            `確定要從觀察清單刪除「${w.symbol}」嗎？`,
            () => {
                State.deleteWatchlist(id);
                Toast.success('已刪除');
                Sync.scheduleSync();
            }
        );
    }
};

/* ============================================================
   🔄 模組 10：Sync - 自動同步引擎
   ============================================================ */
const Sync = {
    debouncedSync: null,
    
    init() {
        // 建立防抖版本的同步
        this.debouncedSync = Utils.debounce(
            () => this.syncToCloud(),
            CONFIG.SYNC.DEBOUNCE_DELAY
        );
        
        // 啟動自動同步
        this.startAutoSync();
        
        // 監聽網路狀態
        window.addEventListener('online', () => {
            Toast.info('網路已連接，準備同步');
            this.syncToCloud();
        });
        
        window.addEventListener('offline', () => {
            Toast.warning('離線中，資料將儲存在本地');
        });
        
        // 頁面切回前景時自動拉取
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                this.syncFromCloud(true);
            }
        });
    },
    
    /**
     * 啟動自動同步定時器
     */
    startAutoSync() {
        if (State.autoSyncTimer) clearInterval(State.autoSyncTimer);
        State.autoSyncTimer = setInterval(() => {
            this.syncFromCloud(true);
        }, CONFIG.SYNC.AUTO_SYNC_INTERVAL);
        console.log(`[Sync] 自動同步已啟動（${CONFIG.SYNC.AUTO_SYNC_INTERVAL / 1000} 秒）`);
    },
    
    /**
     * 排程同步（防抖）
     */
    scheduleSync() {
        State.setSyncStatus('syncing');
        UI.updateSyncStatus('syncing');
        this.debouncedSync();
    },
    
    /**
     * 從雲端拉取資料
     */
    async syncFromCloud(silent = false) {
        if (!Storage.isConfigured()) return;
        if (!navigator.onLine) {
            if (!silent) Toast.warning('離線中，無法同步');
            return;
        }
        
        try {
            State.setSyncStatus('syncing');
            UI.updateSyncStatus('syncing');
            
            const cloudData = await GistAPI.load();
            State.setData(cloudData);
            Storage.saveLastSync(new Date().toISOString());
            
            UI.renderAll();
            State.setSyncStatus('synced');
            UI.updateSyncStatus('synced');
            
            if (!silent) Toast.success('已從雲端同步最新資料');
            console.log('[Sync] 從雲端同步成功');
        } catch (e) {
            console.error('[Sync] 從雲端同步失敗', e);
            State.setSyncStatus('error');
            UI.updateSyncStatus('error');
            if (!silent) Toast.error('同步失敗：' + e.message);
        }
    },
    
    /**
     * 推送資料到雲端
     */
    async syncToCloud() {
        if (!Storage.isConfigured()) return;
        if (!navigator.onLine) {
            Toast.warning('離線中，資料已暫存本地');
            return;
        }
        
        try {
            State.setSyncStatus('syncing');
            UI.updateSyncStatus('syncing');
            
            await GistAPI.saveWithRetry(State.data);
            Storage.saveLastSync(new Date().toISOString());
            
            State.setSyncStatus('synced');
            UI.updateSyncStatus('synced');
            UI.renderSettings();
            
            console.log('[Sync] 推送雲端成功');
        } catch (e) {
            console.error('[Sync] 推送雲端失敗', e);
            State.setSyncStatus('error');
            UI.updateSyncStatus('error');
            Toast.error('儲存失敗：' + e.message);
        }
    },
    
    /**
     * 手動同步（雙向）
     */
    async manualSync() {
        Toast.info('開始同步...');
        await this.syncToCloud();
        await this.syncFromCloud(false);
    }
};

/* ============================================================
   🚀 模組 11：App - 主應用程式
   ============================================================ */
const App = {
    /**
     * 應用程式啟動
     */
    async start() {
        console.log(`[Portfolio] 啟動 v${CONFIG.VERSION}`);
        
        // 初始化各模組
        Toast.init();
        Modal.init();
        
        // 檢查是否已設定
        if (!Storage.isConfigured()) {
            this.showSetup();
            return;
        }
        
        // 顯示載入動畫
        document.getElementById('loadingOverlay').classList.remove('hidden');
        
        // 載入快取（先顯示舊資料）
        const cache = Storage.getCache();
        if (cache) {
            State.setData(cache);
        }
        
        // 顯示主介面
        document.getElementById('setupScreen').classList.remove('active');
        document.getElementById('appContainer').classList.add('active');
        UI.renderAll();
        
        // 綁定事件
        this.bindEvents();
        
        // 啟動同步引擎
        Sync.init();
        
        // 從雲端拉取最新資料
        await Sync.syncFromCloud(false);
        
        // 隱藏載入動畫
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }, 300);
    },
    
    /**
     * 顯示設定頁
     */
    showSetup() {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('setupScreen').classList.add('active');
        document.getElementById('appContainer').classList.remove('active');
        
        document.getElementById('setupSaveBtn').addEventListener('click', () => this.handleSetupSave());
    },
    
    /**
     * 處理初始設定儲存
     */
    async handleSetupSave() {
        const token = document.getElementById('setupToken').value.trim();
        const gistId = document.getElementById('setupGistId').value.trim();
        
        // 驗證格式
        if (!Utils.isValidToken(token)) {
            Toast.error('Token 格式錯誤（應為 github_pat_xxx 或 ghp_xxx）');
            return;
        }
        if (!Utils.isValidGistId(gistId)) {
            Toast.error('Gist ID 格式錯誤（應為 20 位以上的英數字）');
            return;
        }
        
        // 顯示測試中
        const btn = document.getElementById('setupSaveBtn');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '驗證中...';
        
        // 測試 Token
        const tokenTest = await GistAPI.testToken(token);
        if (!tokenTest.success) {
            Toast.error('Token 驗證失敗：' + tokenTest.error);
            btn.disabled = false;
            btn.textContent = originalText;
            return;
        }
        
        // 測試 Gist
        const gistTest = await GistAPI.testGist(token, gistId);
        if (!gistTest.success) {
            Toast.error('Gist 驗證失敗：' + gistTest.error);
            btn.disabled = false;
            btn.textContent = originalText;
            return;
        }
        
        // 儲存設定
        Storage.saveToken(token);
        Storage.saveGistId(gistId);
        
        Toast.success(`歡迎，${tokenTest.username}！`);
        
        // 啟動主程式
        setTimeout(() => this.start(), 500);
    },
    
    /**
     * 綁定全域事件
     */
    bindEvents() {
        // 分頁切換
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                UI.switchTab(btn.dataset.tab);
                if (btn.dataset.tab === 'settings') UI.renderSettings();
            });
        });
        
        // 新增按鈕
        document.getElementById('addStockBtn').addEventListener('click', () => Modal.openStockForm());
        document.getElementById('addFuturesBtn').addEventListener('click', () => Modal.openFuturesForm());
        document.getElementById('addWatchBtn').addEventListener('click', () => Modal.openWatchlistForm());
        
        // 設定頁按鈕
        document.getElementById('manualSyncBtn').addEventListener('click', () => Sync.manualSync());
        document.getElementById('exportBtn').addEventListener('click', () => this.exportData());
        document.getElementById('importBtn').addEventListener('click', () => this.importData());
        document.getElementById('resetBtn').addEventListener('click', () => this.resetSettings());
        
        // 訂閱資料變化 → 自動重新渲染
        State.subscribe((event) => {
            if (event.startsWith('data:') || 
                event.startsWith('stock:') || 
                event.startsWith('futures:') || 
                event.startsWith('watch:')) {
                UI.renderAll();
            }
        });
    },
    
    /**
     * 匯出資料為 JSON 檔
     */
    exportData() {
        const json = JSON.stringify(State.data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const date = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = `portfolio_backup_${date}.json`;
        a.click();
        URL.revokeObjectURL(url);
        Toast.success('已匯出備份檔');
    },
    
    /**
     * 匯入 JSON 檔
     */
    importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    const normalized = GistAPI.normalizeData(data);
                    Modal.confirm(
                        '⚠️ 確認匯入',
                        `將會覆蓋目前所有資料，確定嗎？<br>匯入：${normalized.stocks.length} 檔持股、${normalized.futures.length} 筆期貨、${normalized.watchlist.length} 筆觀察清單`,
                        () => {
                            State.setData(normalized);
                            UI.renderAll();
                            Toast.success('匯入成功');
                            Sync.scheduleSync();
                        }
                    );
                } catch (err) {
                    Toast.error('檔案格式錯誤');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    },
    
    /**
     * 重設所有設定
     */
    resetSettings() {
        Modal.confirm(
            '⚠️ 重設設定',
            '將會清除 Token、Gist ID 和本地快取。<br>雲端資料不會被刪除。<br>確定繼續嗎？',
            () => {
                Storage.clearAll();
                Toast.info('設定已清除，重新載入中...');
                setTimeout(() => location.reload(), 1000);
            }
        );
    }
};

/* ============================================================
   🎬 啟動應用程式
   ============================================================ */
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => App.start());
} else {
    App.start();
}

console.log('[Portfolio] Part 2 已載入，應用程式即將啟動');


</script>
